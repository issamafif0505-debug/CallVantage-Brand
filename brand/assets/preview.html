<!DOCTYPE html>
<html>
<head><title>CALL'VANTAGE Logo Preview</title>
<style>
body { margin: 40px; font-family: 'Segoe UI', sans-serif; }
.row { margin: 30px 0; padding: 20px; border: 1px solid #ddd; border-radius: 8px; }
.dark-bg { background: #0A1628; }
h3 { margin: 0 0 12px; color: #333; }
img { max-width: 100%; }
.icon-row { display: flex; gap: 30px; align-items: center; }
</style>
</head>
<body>
<h1>CALL'VANTAGE - Concept 1: Lightning Bolt</h1>

<div class="row">
<h3>1. Primary Logo (transparent bg)</h3>
<img src="concept1-logo-primary.svg" alt="Primary Logo">
</div>

<div class="row icon-row">
<div>
<h3>2. Icon / Monogram</h3>
<img src="concept1-logo-icon.svg" alt="Icon" style="width:120px">
</div>
<div>
<h3>5. Favicon (32x32)</h3>
<img src="concept1-favicon.svg" alt="Favicon" style="width:32px">
<img src="concept1-favicon.svg" alt="Favicon 2x" style="width:64px">
</div>
</div>

<div class="row dark-bg">
<h3 style="color:#fff">3. White Version (on dark bg)</h3>
<img src="concept1-logo-white.svg" alt="White Logo">
</div>

<div class="row" style="background:#F0F2F5">
<h3>4. Dark Version (on light bg)</h3>
<img src="concept1-logo-dark.svg" alt="Dark Logo">
</div>

</body>
</html>
