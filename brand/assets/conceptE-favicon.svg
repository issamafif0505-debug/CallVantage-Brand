<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="CV">
  <!--
    Concept E: "Le Registre" — Favicon
    Navy circle with white C/V monogram and gold rule.
    Optimized for 16x16 and 32x32 rendering.
    Minimal detail, maximum legibility at small sizes.
  -->
  <defs>
    <linearGradient id="eFavRule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="10%" stop-color="#C9A84C" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#C9A84C" stop-opacity="1"/>
      <stop offset="90%" stop-color="#C9A84C" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Navy circle -->
  <circle cx="16" cy="16" r="15" fill="#0A1628"/>

  <!-- C — Bold, white -->
  <text x="16" y="14.5"
        font-family="Georgia,'Times New Roman',serif"
        font-weight="700"
        font-size="13"
        fill="#F8F9FA"
        text-anchor="middle">C</text>

  <!-- Gold rule -->
  <line x1="7" y1="17" x2="25" y2="17"
        stroke="url(#eFavRule)" stroke-width="0.5"/>

  <!-- V — Regular, white -->
  <text x="16" y="27"
        font-family="Georgia,'Times New Roman',serif"
        font-weight="400"
        font-size="12"
        fill="#F8F9FA"
        text-anchor="middle">V</text>
</svg>