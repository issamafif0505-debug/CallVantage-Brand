<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="CV">
  <defs>
    <linearGradient id="dFG" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00A8E8"/>
      <stop offset="70%" stop-color="#00A8E8"/>
      <stop offset="100%" stop-color="#C9A84C"/>
