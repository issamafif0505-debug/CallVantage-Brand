<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="favBoltGrad" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#00A8E8"/>
      <stop offset="55%" stop-color="#4DC9F6"/>
      <stop offset="100%" stop-color="#00A8E8"/>
    </linearGradient>
    <linearGradient id="favBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="100%" stop-color="#101E33"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="url(#favBg)"/>

  <!-- C letter -->
  <text x="1" y="24" font-family="'Segoe UI','Helvetica Neue','Arial',sans-serif" font-size="22" font-weight="800" fill="#F8F9FA">C</text>

  <!-- Lightning bolt — compact for 32px -->
  <path d="
    M 15.5,3.5
    L 18.5,3.5
    L 16.8,10.5
    L 19,10.5
    L 14,19
    L 15.5,12
    L 13.5,12
    Z
  " fill="url(#favBoltGrad)"/>

  <!-- V letter -->
  <text x="16.5" y="24" font-family="'Segoe UI','Helvetica Neue','Arial',sans-serif" font-size="22" font-weight="500" fill="#F8F9FA">V</text>
</svg>