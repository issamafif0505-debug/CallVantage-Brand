<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" width="480" height="120">
  <defs>
    <linearGradient id="whiteArcGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.6"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="whiteArcGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#FFFFFF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="whiteGlow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="whiteSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2"/>
    </filter>
  </defs>

  <!-- CALL text -->
  <text x="30" y="82" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="700" letter-spacing="5" fill="#F8F9FA">CALL</text>

  <!-- White arc bridge -->
  <path d="M 183 30 Q 210 8, 237 30" stroke="url(#whiteArcGlow)" stroke-width="8" fill="none" stroke-linecap="round" filter="url(#whiteSoftGlow)"/>
  <path d="M 185 32 Q 210 12, 235 32" stroke="url(#whiteArcGrad)" stroke-width="2.8" fill="none" stroke-linecap="round" filter="url(#whiteGlow)"/>

  <!-- Energy dots -->
  <circle cx="190" cy="29" r="1.3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="198" cy="22" r="1.0" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="210" cy="18" r="1.5" fill="#FFFFFF" opacity="0.75"/>
  <circle cx="222" cy="22" r="1.0" fill="#FFFFFF" opacity="0.45"/>
  <circle cx="230" cy="29" r="1.3" fill="#FFFFFF" opacity="0.6"/>
  <circle cx="195" cy="26" r="0.6" fill="#FFFFFF" opacity="0.3"/>
  <circle cx="206" cy="17" r="0.7" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="215" cy="17" r="0.6" fill="#FFFFFF" opacity="0.25"/>
  <circle cx="226" cy="26" r="0.6" fill="#FFFFFF" opacity="0.3"/>

  <!-- VANTAGE text -->
  <text x="240" y="82" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="52" font-weight="300" letter-spacing="5" fill="#F8F9FA">VANTAGE</text>

  <!-- Subtle baseline accent -->
  <line x1="32" y1="92" x2="448" y2="92" stroke="#F8F9FA" stroke-width="0.5" opacity="0.2"/>
</svg>