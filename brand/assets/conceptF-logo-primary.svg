<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 90" role="img" aria-label="CALL'VANTAGE logo">
  <defs>
    <linearGradient id="fSealGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A67C30"/>
      <stop offset="50%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#A67C30"/>
    </linearGradient>
  </defs>

  <!-- Monogram Seal -->
  <circle cx="42" cy="45" r="36" fill="none" stroke="#C9A84C" stroke-width="1.2"/>
  <circle cx="42" cy="45" r="33" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.4"/>
  <text x="22" y="59" font-family="Georgia,'Palatino Linotype','Times New Roman',serif" font-size="38" font-weight="700" fill="#0A1628">C</text>
  <text x="44" y="59" font-family="Georgia,'Palatino Linotype','Times New Roman',serif" font-size="38" font-weight="400" fill="url(#fSealGold)">V</text>

  <!-- Thin separator -->
  <line x1="96" y1="22" x2="96" y2="68" stroke="#C9A84C" stroke-width="0.4" opacity="0.25"/>

  <!-- CALL — heavy sans-serif -->
  <text x="116" y="56" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="800" letter-spacing="5" fill="#0A1628">CALL</text>

  <!-- Apostrophe in gold -->
  <text x="260" y="36" font-family="Georgia,'Palatino Linotype',serif" font-size="24" fill="#C9A84C">&#x2019;</text>

  <!-- VANTAGE — light sans-serif -->
  <text x="274" y="56" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="32" font-weight="300" letter-spacing="5" fill="#0A1628">VANTAGE</text>
</svg>