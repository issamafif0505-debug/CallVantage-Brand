<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <!-- Light gold for dark backgrounds — higher luminance -->
    <linearGradient id="wGold" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#F0E0A0"/>
      <stop offset="50%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <filter id="wShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.8"/>
      <feOffset dx="0" dy="0.5"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- "CALL" — White -->
  <text x="20" y="78"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="56"
        letter-spacing="6"
        fill="#F8F9FA"
        >CALL</text>

  <!-- The Apostrophe-Checkmark — Gold, same as primary -->
  <g transform="translate(202, 22)" filter="url(#wShadow)">
    <path d="M 2 28
             C 0 24, 1 18, 4 14
             C 6 11, 9 8, 11 4
             C 12 2, 14 0, 15 0
             C 17 0, 18 2, 17 5
             C 16 8, 13 14, 10 19
             C 8 22, 6 25, 5 28
             C 4 30, 2 30, 2 28 Z"
          fill="url(#wGold)"/>
    <path d="M 0 26
             L 3 29
             L 7 23"
          fill="none"
          stroke="url(#wGold)"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.9"/>
  </g>

  <!-- "VANTAGE" — White -->
  <text x="226" y="78"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="56"
        letter-spacing="6"
        fill="#F8F9FA"
        >VANTAGE</text>

  <!-- Gold underline — slightly more visible on dark backgrounds -->
  <line x1="20" y1="94" x2="580" y2="94"
        stroke="#C9A84C"
        stroke-width="1.2"
        opacity="0.6"/>

  <!-- Tagline — light blue, readable on dark -->
  <text x="580" y="110"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="10"
        letter-spacing="3"
        fill="#4DC9F6"
        text-anchor="end"
        opacity="0.8"
        >VERIFIED APPOINTMENTS</text>
</svg>