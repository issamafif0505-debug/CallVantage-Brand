<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="fGold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8D48B"/>
      <stop offset="60%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A8842C"/>
    </linearGradient>
    <linearGradient id="fBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D1B2E"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="32" height="32" rx="5" ry="5" fill="url(#fBg)"/>

  <!-- C — Bold, white, simplified for small size -->
  <text x="3" y="24"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="21"
        fill="#F8F9FA"
        >C</text>

  <!-- Gold apostrophe-check — simplified for favicon readability -->
  <g transform="translate(14.5, 4)">
    <!-- Simplified apostrophe drop -->
    <path d="M 1.5 8
             C 1 6, 1.5 3.5, 3 1.5
             C 3.5 0.8, 4 0.3, 4.5 0.3
             C 5 0.3, 5.2 1, 4.8 2
             C 4.2 3.5, 3 5.5, 2.5 7
             C 2 8, 1.5 8.5, 1.5 8 Z"
          fill="url(#fGold)"/>
    <!-- Tiny check tick -->
    <path d="M 0.5 7
             L 2 8.5
             L 4 6"
          fill="none"
          stroke="url(#fGold)"
          stroke-width="1.2"
          stroke-linecap="round"
          stroke-linejoin="round"/>
  </g>

  <!-- V — Bold, white -->
  <text x="16" y="24"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="700"
        font-size="21"
        fill="#F8F9FA"
        >V</text>

  <!-- Minimal gold accent line at bottom -->
  <line x1="4" y1="28" x2="28" y2="28"
        stroke="#C9A84C"
        stroke-width="0.8"
        opacity="0.6"/>
</svg>