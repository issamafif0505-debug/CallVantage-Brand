<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A67C30"/>
      <stop offset="50%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#A67C30"/>
    </linearGradient>
  </defs>

  <!-- Navy background -->
  <rect width="32" height="32" rx="5" fill="#0A1628"/>

  <!-- C — bold -->
  <text x="2" y="22" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="800" fill="#F8F9FA">C</text>

  <!-- Diamond -->
  <polygon points="16,8 19,12 16,16 13,12" fill="url(#fGold)"/>

  <!-- V — light -->
  <text x="18" y="22" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="300" fill="#F8F9FA">V</text>
</svg>