<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 80" role="img" aria-label="CALL'VANTAGE logo white">
  <!-- CALL — heavy weight, white -->
  <text x="18" y="55" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="800" letter-spacing="6" fill="#F8F9FA">CALL</text>

  <!-- Le Duo — two parallel strokes -->
  <line x1="186" y1="38" x2="189" y2="18" stroke="#F8F9FA" stroke-width="2.8" stroke-linecap="round"/>
  <line x1="194" y1="38" x2="197" y2="18" stroke="#C9A84C" stroke-width="2.8" stroke-linecap="round"/>

  <!-- VANTAGE — light weight, white -->
  <text x="210" y="55" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="40" font-weight="300" letter-spacing="6" fill="#F8F9FA">VANTAGE</text>

  <!-- Subtle gold underline -->
  <line x1="18" y1="68" x2="520" y2="68" stroke="#C9A84C" stroke-width="0.5" opacity="0.2"/>
</svg>