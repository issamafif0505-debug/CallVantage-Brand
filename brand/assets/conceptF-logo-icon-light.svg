<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-label="CALL'VANTAGE monogram light">
  <defs>
    <linearGradient id="filGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A67C30"/>
      <stop offset="50%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#A67C30"/>
    </linearGradient>
  </defs>

  <!-- Light background -->
  <rect width="80" height="80" rx="12" fill="#F8F9FA"/>

  <!-- Circle border -->
  <circle cx="40" cy="40" r="30" fill="none" stroke="#C9A84C" stroke-width="1"/>
  <circle cx="40" cy="40" r="27" fill="none" stroke="#C9A84C" stroke-width="0.3" opacity="0.3"/>

  <!-- C in navy -->
  <text x="20" y="54" font-family="Georgia,'Palatino Linotype','Times New Roman',serif" font-size="34" font-weight="700" fill="#0A1628">C</text>

  <!-- V in gold -->
  <text x="40" y="54" font-family="Georgia,'Palatino Linotype','Times New Roman',serif" font-size="34" font-weight="400" fill="url(#filGold)">V</text>
</svg>