<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 90">
  <defs>
    <linearGradient id="diamondGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A67C30"/>
      <stop offset="25%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#E8D48B"/>
      <stop offset="75%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#A67C30"/>
    </linearGradient>
    <linearGradient id="diamondEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8D48B"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
  </defs>

  <!-- CALL — heavy weight -->
  <text x="20" y="58" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="800" letter-spacing="6" fill="#0A1628">CALL</text>

  <!-- The Diamond — precision apostrophe -->
  <g transform="translate(200, 45)">
    <!-- Crosshair lines — ultra faint -->
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#C9A84C" stroke-width="0.3" opacity="0.25"/>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#C9A84C" stroke-width="0.3" opacity="0.25"/>
    <!-- Diamond shape — faceted rhombus -->
    <polygon points="0,-11 8,0 0,11 -8,0" fill="url(#diamondGold)" stroke="url(#diamondEdge)" stroke-width="0.6"/>
    <!-- Inner facet highlight -->
    <polygon points="0,-6 4,0 0,6 -4,0" fill="none" stroke="#E8D48B" stroke-width="0.3" opacity="0.4"/>
  </g>

  <!-- VANTAGE — light weight -->
  <text x="222" y="58" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="42" font-weight="300" letter-spacing="6" fill="#0A1628">VANTAGE</text>
</svg>