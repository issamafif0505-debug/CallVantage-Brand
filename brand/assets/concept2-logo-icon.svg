<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="iconGoldArc" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="45%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="iconGoldGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E8D48B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#C9A84C" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E1D35"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <filter id="iconArcGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="iconSoftGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect x="0" y="0" width="64" height="64" rx="12" ry="12" fill="url(#iconBg)"/>

  <!-- C letter -->
  <text x="8" y="45" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="700" fill="#F8F9FA" letter-spacing="1">C</text>

  <!-- Golden arc bridge between C and V -->
  <!-- Glow layer -->
  <path d="M 27 14 Q 35 4, 43 14" stroke="url(#iconGoldGlow)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#iconSoftGlow)"/>
  <!-- Main arc -->
  <path d="M 28 15 Q 35 6, 42 15" stroke="url(#iconGoldArc)" stroke-width="1.6" fill="none" stroke-linecap="round" filter="url(#iconArcGlow)"/>

  <!-- Energy dots -->
  <circle cx="31" cy="11" r="0.8" fill="#E8D48B" opacity="0.7"/>
  <circle cx="35" cy="8.5" r="1.0" fill="#E8D48B" opacity="0.85"/>
  <circle cx="39" cy="11" r="0.8" fill="#E8D48B" opacity="0.7"/>

  <!-- V letter -->
  <text x="33" y="45" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#F8F9FA" letter-spacing="1">V</text>

  <!-- Subtle gold baseline -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="#C9A84C" stroke-width="0.4" opacity="0.35"/>
</svg>