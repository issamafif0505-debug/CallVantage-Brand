<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <!-- Darker gold for light backgrounds — richer contrast -->
    <linearGradient id="dGold" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="50%" stop-color="#A8842C"/>
      <stop offset="100%" stop-color="#8A6C1E"/>
    </linearGradient>
    <filter id="dShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="0.6"/>
      <feOffset dx="0" dy="0.4"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.1"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- "CALL" — Deep navy -->
  <text x="20" y="78"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="56"
        letter-spacing="6"
        fill="#0A1628"
        >CALL</text>

  <!-- The Apostrophe-Checkmark — Deeper gold for contrast on white -->
  <g transform="translate(202, 22)" filter="url(#dShadow)">
    <path d="M 2 28
             C 0 24, 1 18, 4 14
             C 6 11, 9 8, 11 4
             C 12 2, 14 0, 15 0
             C 17 0, 18 2, 17 5
             C 16 8, 13 14, 10 19
             C 8 22, 6 25, 5 28
             C 4 30, 2 30, 2 28 Z"
          fill="url(#dGold)"/>
    <path d="M 0 26
             L 3 29
             L 7 23"
          fill="none"
          stroke="url(#dGold)"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
          opacity="0.85"/>
  </g>

  <!-- "VANTAGE" — Deep navy -->
  <text x="226" y="78"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="600"
        font-size="56"
        letter-spacing="6"
        fill="#0A1628"
        >VANTAGE</text>

  <!-- Underline — darker gold, subtle -->
  <line x1="20" y1="94" x2="580" y2="94"
        stroke="#A8842C"
        stroke-width="1.2"
        opacity="0.4"/>

  <!-- Tagline — deep blue -->
  <text x="580" y="110"
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-weight="400"
        font-size="10"
        letter-spacing="3"
        fill="#0077B6"
        text-anchor="end"
        opacity="0.65"
        >VERIFIED APPOINTMENTS</text>
</svg>