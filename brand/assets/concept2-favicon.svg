<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="favGold" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C9A84C"/>
      <stop offset="45%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="favGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#E8D48B" stop-opacity="0"/>
      <stop offset="50%" stop-color="#E8D48B" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#E8D48B" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="favBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0E1D35"/>
      <stop offset="100%" stop-color="#0A1628"/>
    </linearGradient>
    <filter id="favArcGlow" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="0.7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="32" height="32" rx="6" ry="6" fill="url(#favBg)"/>

  <!-- C letter -->
  <text x="3" y="24" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="700" fill="#F8F9FA">C</text>

  <!-- Golden arc -->
  <path d="M 13 8 Q 17.5 2, 22 8" stroke="url(#favGlow)" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 13.5 8.5 Q 17.5 3, 21.5 8.5" stroke="url(#favGold)" stroke-width="1.2" fill="none" stroke-linecap="round" filter="url(#favArcGlow)"/>

  <!-- Center dot -->
  <circle cx="17.5" cy="4.5" r="0.7" fill="#E8D48B" opacity="0.8"/>

  <!-- V letter -->
  <text x="17" y="24" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="300" fill="#F8F9FA">V</text>
</svg>