<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALL'VANTAGE - Banniere LinkedIn 1584x396</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #2a2a2a;
    font-family: 'Inter', sans-serif;
  }

  .banner {
    width: 1584px;
    height: 396px;
    background: #0A1628;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  /* Geometric pattern overlay */
  .banner::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse 800px 400px at 85% 50%, rgba(0, 168, 232, 0.08) 0%, transparent 70%),
      radial-gradient(ellipse 600px 300px at 15% 60%, rgba(201, 168, 76, 0.06) 0%, transparent 70%);
    z-index: 1;
  }

  /* Subtle grid pattern */
  .banner::after {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image:
      linear-gradient(rgba(201, 168, 76, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201, 168, 76, 0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    z-index: 1;
  }

  /* Gold accent line top */
  .gold-line-top {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, #C9A84C 20%, #C9A84C 80%, transparent 100%);
    z-index: 5;
  }

  /* Gold accent line bottom */
  .gold-line-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent 0%, #C9A84C 20%, #C9A84C 80%, transparent 100%);
    z-index: 5;
  }

  /* Decorative corner elements */
  .corner-tl {
    position: absolute;
    top: 16px;
    left: 16px;
    width: 40px;
    height: 40px;
    border-top: 2px solid rgba(201, 168, 76, 0.4);
    border-left: 2px solid rgba(201, 168, 76, 0.4);
    z-index: 3;
  }

  .corner-tr {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    border-top: 2px solid rgba(201, 168, 76, 0.4);
    border-right: 2px solid rgba(201, 168, 76, 0.4);
    z-index: 3;
  }

  .corner-bl {
    position: absolute;
    bottom: 16px;
    left: 16px;
    width: 40px;
    height: 40px;
    border-bottom: 2px solid rgba(201, 168, 76, 0.4);
    border-left: 2px solid rgba(201, 168, 76, 0.4);
    z-index: 3;
  }

  .corner-br {
    position: absolute;
    bottom: 16px;
    right: 16px;
    width: 40px;
    height: 40px;
    border-bottom: 2px solid rgba(201, 168, 76, 0.4);
    border-right: 2px solid rgba(201, 168, 76, 0.4);
    z-index: 3;
  }

  /* Geometric decoration right */
  .geo-right {
    position: absolute;
    right: -60px;
    top: 50%;
    transform: translateY(-50%);
    width: 320px;
    height: 320px;
    border: 1px solid rgba(0, 168, 232, 0.12);
    border-radius: 50%;
    z-index: 2;
  }

  .geo-right::before {
    content: '';
    position: absolute;
    top: 30px;
    left: 30px;
    right: 30px;
    bottom: 30px;
    border: 1px solid rgba(201, 168, 76, 0.1);
    border-radius: 50%;
  }

  .geo-right::after {
    content: '';
    position: absolute;
    top: 60px;
    left: 60px;
    right: 60px;
    bottom: 60px;
    border: 1px solid rgba(0, 168, 232, 0.08);
    border-radius: 50%;
  }

  /* Diagonal accent */
  .diagonal-accent {
    position: absolute;
    right: 380px;
    top: -20px;
    width: 2px;
    height: 440px;
    background: linear-gradient(180deg, transparent 0%, rgba(201, 168, 76, 0.2) 30%, rgba(201, 168, 76, 0.2) 70%, transparent 100%);
    transform: rotate(15deg);
    z-index: 2;
  }

  .diagonal-accent-2 {
    position: absolute;
    right: 395px;
    top: -20px;
    width: 1px;
    height: 440px;
    background: linear-gradient(180deg, transparent 0%, rgba(0, 168, 232, 0.15) 30%, rgba(0, 168, 232, 0.15) 70%, transparent 100%);
    transform: rotate(15deg);
    z-index: 2;
  }

  /* Content container */
  .content {
    position: relative;
    z-index: 4;
    padding-left: 100px;
    max-width: 1050px;
  }

  .brand-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #C9A84C;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-label::before {
    content: '';
    width: 30px;
    height: 1px;
    background: #C9A84C;
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-size: 46px;
    font-weight: 800;
    color: #F8F9FA;
    line-height: 1.15;
    margin-bottom: 18px;
    letter-spacing: -0.5px;
  }

  .tagline .highlight {
    color: #C9A84C;
  }

  .tagline .blue-highlight {
    color: #00A8E8;
  }

  .subtitle {
    font-size: 17px;
    font-weight: 400;
    color: rgba(248, 249, 250, 0.7);
    line-height: 1.5;
    margin-bottom: 24px;
    max-width: 620px;
  }

  .stats-row {
    display: flex;
    gap: 40px;
    align-items: center;
  }

  .stat {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 800;
    color: #00A8E8;
  }

  .stat-label {
    font-size: 11px;
    font-weight: 500;
    color: rgba(248, 249, 250, 0.5);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .stat-divider {
    width: 1px;
    height: 36px;
    background: rgba(201, 168, 76, 0.3);
  }

  /* Right side info panel */
  .right-panel {
    position: absolute;
    right: 80px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 4;
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 18px;
  }

  .guarantee-badge {
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.15), rgba(201, 168, 76, 0.05));
    border: 1px solid rgba(201, 168, 76, 0.3);
    border-radius: 8px;
    padding: 14px 20px;
    text-align: center;
  }

  .guarantee-badge .badge-title {
    font-size: 11px;
    font-weight: 600;
    color: #C9A84C;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .guarantee-badge .badge-text {
    font-size: 14px;
    font-weight: 700;
    color: #F8F9FA;
  }

  .contact-info {
    font-size: 12px;
    color: rgba(248, 249, 250, 0.5);
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
  }

  .contact-info .whatsapp {
    color: rgba(201, 168, 76, 0.8);
    font-weight: 500;
    font-size: 13px;
  }

  /* Dots decoration */
  .dots {
    position: absolute;
    bottom: 40px;
    left: 100px;
    display: flex;
    gap: 6px;
    z-index: 3;
  }

  .dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: rgba(201, 168, 76, 0.3);
  }

  .dot.active {
    background: #C9A84C;
    width: 20px;
    border-radius: 2px;
  }
</style>
</head>
<body>

<div class="banner">
  <!-- Decorative elements -->
  <div class="gold-line-top"></div>
  <div class="gold-line-bottom"></div>
  <div class="corner-tl"></div>
  <div class="corner-tr"></div>
  <div class="corner-bl"></div>
  <div class="corner-br"></div>
  <div class="geo-right"></div>
  <div class="diagonal-accent"></div>
  <div class="diagonal-accent-2"></div>

  <!-- Main content -->
  <div class="content">
    <div class="brand-label">CALL'VANTAGE</div>
    <div class="tagline">
      Des RDV <span class="highlight">qualifi&eacute;s</span><br>
      pour les courtiers en <span class="blue-highlight">&eacute;nergie</span>
    </div>
    <div class="subtitle">
      &Eacute;ch&eacute;ance contrat v&eacute;rifi&eacute;e &bull; RDV non qualifi&eacute; = remplac&eacute; &bull; Tarifs optimis&eacute;s
    </div>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-value">30-100&euro;</div>
        <div class="stat-label">Par RDV qualifi&eacute;</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-value">85%</div>
        <div class="stat-label">Taux qualification</div>
      </div>
      <div class="stat-divider"></div>
      <div class="stat">
        <div class="stat-value">GMT+1</div>
        <div class="stat-label">M&ecirc;me fuseau horaire</div>
      </div>
    </div>
  </div>

  <!-- Right panel -->
  <div class="right-panel">
    <div class="guarantee-badge">
      <div class="badge-title">Garantie</div>
      <div class="badge-text">RDV non qualifi&eacute; = remplac&eacute;</div>
    </div>
    <div class="contact-info">
      <span class="whatsapp">WhatsApp : +212 664860353</span>
      <span>Marrakech, Maroc</span>
    </div>
  </div>

  <!-- Dots decoration -->
  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

</body>
</html>
