<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CALL'VANTAGE - Banniere Facebook 820x312</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #2a2a2a;
    font-family: 'Inter', sans-serif;
  }

  .banner {
    width: 820px;
    height: 312px;
    background: #0A1628;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
  }

  /* Background effects */
  .banner::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse 500px 300px at 80% 50%, rgba(0, 168, 232, 0.07) 0%, transparent 70%),
      radial-gradient(ellipse 400px 200px at 20% 50%, rgba(201, 168, 76, 0.05) 0%, transparent 70%);
    z-index: 1;
  }

  /* Gold lines */
  .gold-top {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent 5%, #C9A84C 30%, #C9A84C 70%, transparent 95%);
    z-index: 5;
  }

  .gold-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 3px;
    background: linear-gradient(90deg, transparent 5%, #C9A84C 30%, #C9A84C 70%, transparent 95%);
    z-index: 5;
  }

  /* Diagonal decorative line */
  .diag-line {
    position: absolute;
    right: 240px;
    top: -10px;
    width: 1px;
    height: 340px;
    background: linear-gradient(180deg, transparent 0%, rgba(201, 168, 76, 0.2) 20%, rgba(201, 168, 76, 0.2) 80%, transparent 100%);
    transform: rotate(12deg);
    z-index: 2;
  }

  /* Circle decoration */
  .circle-deco {
    position: absolute;
    right: -40px;
    top: 50%;
    transform: translateY(-50%);
    width: 200px;
    height: 200px;
    border: 1px solid rgba(0, 168, 232, 0.1);
    border-radius: 50%;
    z-index: 2;
  }

  .circle-deco::before {
    content: '';
    position: absolute;
    top: 25px;
    left: 25px;
    right: 25px;
    bottom: 25px;
    border: 1px solid rgba(201, 168, 76, 0.08);
    border-radius: 50%;
  }

  /* Content */
  .content {
    position: relative;
    z-index: 4;
    padding-left: 50px;
    max-width: 520px;
  }

  .brand-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #C9A84C;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .brand-label::before {
    content: '';
    width: 24px;
    height: 1px;
    background: #C9A84C;
  }

  .tagline {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 800;
    color: #F8F9FA;
    line-height: 1.2;
    margin-bottom: 12px;
  }

  .tagline .gold {
    color: #C9A84C;
  }

  .tagline .blue {
    color: #00A8E8;
  }

  .subtitle {
    font-size: 13px;
    color: rgba(248, 249, 250, 0.6);
    line-height: 1.5;
    margin-bottom: 18px;
  }

  .stats-row {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .stat-value {
    font-size: 18px;
    font-weight: 800;
    color: #00A8E8;
  }

  .stat-label {
    font-size: 9px;
    font-weight: 500;
    color: rgba(248, 249, 250, 0.45);
    text-transform: uppercase;
    letter-spacing: 0.8px;
  }

  .stat-div {
    width: 1px;
    height: 28px;
    background: rgba(201, 168, 76, 0.25);
  }

  /* Right panel */
  .right-panel {
    position: absolute;
    right: 40px;
    top: 50%;
    transform: translateY(-50%);
    z-index: 4;
    text-align: right;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 14px;
  }

  .guarantee {
    background: linear-gradient(135deg, rgba(201, 168, 76, 0.12), rgba(201, 168, 76, 0.04));
    border: 1px solid rgba(201, 168, 76, 0.25);
    border-radius: 6px;
    padding: 10px 16px;
    text-align: center;
  }

  .guarantee .g-title {
    font-size: 9px;
    font-weight: 600;
    color: #C9A84C;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 3px;
  }

  .guarantee .g-text {
    font-size: 12px;
    font-weight: 700;
    color: #F8F9FA;
  }

  .contact-small {
    font-size: 11px;
    color: rgba(201, 168, 76, 0.7);
    font-weight: 500;
  }

  .location-small {
    font-size: 10px;
    color: rgba(248, 249, 250, 0.35);
  }
</style>
</head>
<body>

<div class="banner">
  <div class="gold-top"></div>
  <div class="gold-bottom"></div>
  <div class="diag-line"></div>
  <div class="circle-deco"></div>

  <div class="content">
    <div class="brand-label">CALL'VANTAGE</div>
    <div class="tagline">
      RDV <span class="gold">qualifi&eacute;s</span> pour<br>
      courtiers en <span class="blue">&eacute;nergie</span>
    </div>
    <div class="subtitle">
      &Eacute;ch&eacute;ance v&eacute;rifi&eacute;e &bull; Remplacement garanti &bull; 30-100&euro;/RDV
    </div>
    <div class="stats-row">
      <div>
        <div class="stat-value">-70%</div>
        <div class="stat-label">vs France</div>
      </div>
      <div class="stat-div"></div>
      <div>
        <div class="stat-value">85%</div>
        <div class="stat-label">Qualification</div>
      </div>
      <div class="stat-div"></div>
      <div>
        <div class="stat-value">GMT+1</div>
        <div class="stat-label">Fuseau horaire</div>
      </div>
    </div>
  </div>

  <div class="right-panel">
    <div class="guarantee">
      <div class="g-title">Garantie</div>
      <div class="g-text">Non qualifi&eacute; = remplac&eacute;</div>
    </div>
    <div class="contact-small">WhatsApp : +212 664860353</div>
    <div class="location-small">Marrakech, Maroc</div>
  </div>
</div>

</body>
</html>
