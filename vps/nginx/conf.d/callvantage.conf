# ================================================================
# CALL'VANTAGE — Nginx Reverse Proxy Config
# Adapte les domaines selon ton achat de domaine
# ================================================================

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name callvantage.fr www.callvantage.fr n8n.callvantage.fr blog.callvantage.fr;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── N8N (Webhooks + Automations) ─────────────────────────────
server {
    listen 443 ssl;
    server_name n8n.callvantage.fr;

    ssl_certificate     /etc/letsencrypt/live/n8n.callvantage.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.callvantage.fr/privkey.pem;

    location / {
        proxy_pass         http://n8n:5678;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

# ── WordPress (Blog) ─────────────────────────────────────────
server {
    listen 443 ssl;
    server_name blog.callvantage.fr;

    ssl_certificate     /etc/letsencrypt/live/blog.callvantage.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/blog.callvantage.fr/privkey.pem;

    location / {
        proxy_pass       http://wordpress:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
